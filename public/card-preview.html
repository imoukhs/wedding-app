<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Access Card Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0118;
      font-family: 'Jost', sans-serif;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(107,33,168,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .card-container {
      perspective: 1200px;
    }

    /* ===== THE CARD ===== */
    .access-card {
      position: relative;
      width: 380px;
      min-height: 620px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(165deg, #1a0533 0%, #2a0a4a 30%, #1a0533 60%, #120328 100%);
      box-shadow:
        0 0 0 1px rgba(201,162,39,0.3),
        0 0 40px rgba(107,33,168,0.4),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(201,162,39,0.2);
      animation: cardFloat 6s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0) rotateX(0deg) rotateY(0deg); }
      50% { transform: translateY(-12px) rotateX(1deg) rotateY(-1deg); }
    }

    /* Gold shimmer overlay */
    .card-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(201,162,39,0.06) 45%,
        rgba(201,162,39,0.12) 50%,
        rgba(201,162,39,0.06) 55%,
        transparent 60%
      );
      animation: shimmer 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes shimmer {
      0%, 100% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
    }

    /* Ornamental border frame */
    .card-border-frame {
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 18px;
      pointer-events: none;
      z-index: 2;
    }

    .card-border-frame::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201,162,39,0.1);
      border-radius: 14px;
    }

    /* Corner ornaments */
    .corner-ornament {
      position: absolute;
      width: 40px;
      height: 40px;
      z-index: 3;
    }

    .corner-ornament::before,
    .corner-ornament::after {
      content: '';
      position: absolute;
      background: linear-gradient(135deg, #c9a227, #e8c55a);
    }

    .corner-tl { top: 14px; left: 14px; }
    .corner-tl::before { top: 0; left: 0; width: 20px; height: 1.5px; }
    .corner-tl::after { top: 0; left: 0; width: 1.5px; height: 20px; }

    .corner-tr { top: 14px; right: 14px; }
    .corner-tr::before { top: 0; right: 0; width: 20px; height: 1.5px; }
    .corner-tr::after { top: 0; right: 0; width: 1.5px; height: 20px; }

    .corner-bl { bottom: 14px; left: 14px; }
    .corner-bl::before { bottom: 0; left: 0; width: 20px; height: 1.5px; }
    .corner-bl::after { bottom: 0; left: 0; width: 1.5px; height: 20px; }

    .corner-br { bottom: 14px; right: 14px; }
    .corner-br::before { bottom: 0; right: 0; width: 20px; height: 1.5px; }
    .corner-br::after { bottom: 0; right: 0; width: 1.5px; height: 20px; }

    /* Background decorative pattern */
    .card-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        radial-gradient(circle at 20% 80%, #c9a227 1px, transparent 1px),
        radial-gradient(circle at 80% 20%, #c9a227 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, #c9a227 0.5px, transparent 0.5px);
      background-size: 60px 60px, 60px 60px, 30px 30px;
      pointer-events: none;
    }

    /* Purple glow accent */
    .card-glow {
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(107,33,168,0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    .card-glow-bottom {
      position: absolute;
      bottom: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(201,162,39,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ===== CARD CONTENT ===== */
    .card-content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 30px 32px;
      text-align: center;
    }

    /* Top label */
    .card-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(201,162,39,0.7);
      margin-bottom: 6px;
    }

    /* Lock In heading */
    .card-event-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      line-height: 1;
      color: #fdf8f0;
      margin-bottom: 2px;
    }

    .card-event-title em {
      font-style: italic;
      color: #e8c55a;
    }

    .card-event-year {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: #fdf8f0;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }

    /* Couple name */
    .couple-name {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(201,162,39,0.3);
    }

    /* Gold divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      width: 100%;
      justify-content: center;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a227, transparent);
    }

    .divider-diamond {
      color: #c9a227;
      font-size: 10px;
    }

    /* Guest name section */
    .guest-section {
      margin: 8px 0 20px;
    }

    .guest-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.55rem;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(201,162,39,0.5);
      margin-bottom: 8px;
    }

    .guest-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #fdf8f0;
      line-height: 1.1;
    }

    .guest-count {
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      color: rgba(245,230,163,0.5);
      letter-spacing: 0.2em;
      margin-top: 4px;
    }

    /* Event details grid */
    .event-details {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      width: 100%;
      margin: 12px 0 20px;
      padding: 16px 8px;
      background: rgba(26,5,51,0.6);
      border-radius: 12px;
      border: 1px solid rgba(201,162,39,0.1);
    }

    .detail-item {
      text-align: center;
    }

    .detail-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c9a227;
      margin-bottom: 4px;
    }

    .detail-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #fdf8f0;
      line-height: 1.2;
    }

    /* Serial number badge */
    .serial-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: linear-gradient(135deg, rgba(201,162,39,0.15), rgba(201,162,39,0.05));
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 100px;
      margin: 8px 0 16px;
    }

    .serial-number {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #c9a227, #e8c55a, #c9a227);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .serial-dot {
      width: 4px;
      height: 4px;
      background: #c9a227;
      border-radius: 50%;
      opacity: 0.5;
    }

    .serial-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: rgba(201,162,39,0.6);
      text-transform: uppercase;
    }

    /* QR Code placeholder */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .qr-code {
      width: 90px;
      height: 90px;
      background: #fdf8f0;
      border-radius: 10px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(201,162,39,0.15);
    }

    .qr-placeholder {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(45deg, #1a0533 25%, transparent 25%),
        linear-gradient(-45deg, #1a0533 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a0533 75%),
        linear-gradient(-45deg, transparent 75%, #1a0533 75%);
      background-size: 10px 10px;
      background-position: 0 0, 0 5px, 5px -5px, -5px 0;
      border-radius: 6px;
    }

    .qr-hint {
      font-family: 'Jost', sans-serif;
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(245,230,163,0.35);
      text-transform: uppercase;
    }

    /* Verified badge */
    .verified-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 6;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(201,162,39,0.2), rgba(201,162,39,0.05));
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 50%;
    }

    .verified-badge svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #c9a227;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Footer */
    .card-footer {
      position: relative;
      z-index: 5;
      padding: 0 30px 24px;
      text-align: center;
    }

    .card-footer-text {
      font-family: 'Jost', sans-serif;
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: rgba(245,230,163,0.3);
      text-transform: uppercase;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 420px) {
      .access-card {
        width: 340px;
        min-height: 580px;
      }
      .card-content {
        padding: 32px 24px 28px;
      }
      .card-event-title { font-size: 2.2rem; }
      .guest-name { font-size: 1.7rem; }
    }

    /* ===== STATUS VARIANTS ===== */
    /* This shows how the card would look when flagged/invalid */
    .card-status-valid .serial-badge {
      border-color: rgba(34,197,94,0.3);
      background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.02));
    }

    .page-title {
      text-align: center;
      margin-bottom: 40px;
      color: #fdf8f0;
    }

    .page-title h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: #c9a227;
      margin-bottom: 8px;
    }

    .page-title p {
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(245,230,163,0.5);
    }
  </style>
</head>
<body>

  <div>
    <div class="page-title">
      <h1>ACCESS CARD PREVIEW</h1>
      <p>WEDDING GUEST VERIFICATION CARD</p>
    </div>

    <div class="card-container">
      <div class="access-card card-status-valid">
        <!-- Shimmer effect -->
        <div class="card-shimmer"></div>

        <!-- Border frame -->
        <div class="card-border-frame"></div>

        <!-- Corner ornaments -->
        <div class="corner-ornament corner-tl"></div>
        <div class="corner-ornament corner-tr"></div>
        <div class="corner-ornament corner-bl"></div>
        <div class="corner-ornament corner-br"></div>

        <!-- Background -->
        <div class="card-bg-pattern"></div>
        <div class="card-glow"></div>
        <div class="card-glow-bottom"></div>

        <!-- Verified badge -->
        <div class="verified-badge">
          <svg viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </div>

        <!-- Card Content -->
        <div class="card-content">
          <!-- Event branding -->
          <div class="card-label">You are invited to</div>
          <div class="card-event-title"><em>Lock In</em></div>
          <div class="card-event-year">2026</div>
          <div class="couple-name">LAURETTA & CALEB</div>

          <!-- Divider -->
          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond">&#10022;</div>
            <div class="divider-line"></div>
          </div>

          <!-- Guest info -->
          <div class="guest-section">
            <div class="guest-label">This card admits</div>
            <div class="guest-name">Chioma Adeyemi</div>
            <div class="guest-count">+ 1 Guest</div>
          </div>

          <!-- Event details -->
          <div class="event-details">
            <div class="detail-item">
              <div class="detail-label">Date</div>
              <div class="detail-value">April 25<br>2026</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Time</div>
              <div class="detail-value">1:30 PM</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Venue</div>
              <div class="detail-value">Royal<br>Gardens</div>
            </div>
          </div>

          <!-- Serial number -->
          <div class="serial-badge">
            <span class="serial-label">S/N</span>
            <span class="serial-dot"></span>
            <span class="serial-number">LK2026-001</span>
          </div>

          <!-- QR Code -->
          <div class="qr-section">
            <div class="qr-code">
              <div class="qr-placeholder"></div>
            </div>
            <span class="qr-hint">Scan to verify</span>
          </div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
          <div class="card-footer-text">Non-transferable &bull; One-time access</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
